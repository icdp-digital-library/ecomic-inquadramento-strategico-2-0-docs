document:
  name: Ecomic, Documento di inquadramento strategico
  description: |
    Ecomic è l'ecosistema digitale promosso dall'Istituto centrale per la digitalizzazione del patrimonio culturale – Digital Library per supportare la trasformazione digitale del patrimonio culturale italiano. Il documento descrive la strategia, l'architettura tecnologica e i servizi dell'ecosistema, articolati nei tre sistemi integrati D.PaC, I.PaC e DPaaS, e i servizi digitali rivolti a istituzioni, professionisti e cittadini.
  tags:
    - patrimonio culturale digitale
    - digitalizzazione
    - ecosistema digitale
    - PNRR
    - beni culturali
    - digital transformation
